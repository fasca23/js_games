<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐹 Хомяк - Захват территории</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-wrapper">
        <h1>🐹 Хомяк</h1>
        <div class="records-bar">
            🏆 Рекорд: <span id="highscoreValue">0%</span>
        </div>
        
        <div class="game-container">
            <canvas id="gameCanvas"></canvas>
            
            <div class="stats-row">
                <div class="stat">🎯 Захвачено: <span id="scoreValue">0%</span></div>
                <div class="stat">❤️ Жизни: <span id="livesValue">3</span></div>
                <div class="stat">👻 Врагов: <span id="ghostCount">2</span></div>
            </div>
            
            <div class="game-buttons">
                <button class="restart-btn" onclick="restartGame()">🔄 Заново</button>
                <button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸️ Пауза</button>
            </div>
            
            <div class="mobile-controls">
                <div class="control-row">
                    <button class="control-btn" id="btnUp">▲</button>
                </div>
                <div class="control-row">
                    <button class="control-btn" id="btnLeft">◀</button>
                    <button class="control-btn" id="btnDown">▼</button>
                    <button class="control-btn" id="btnRight">▶</button>
                </div>
            </div>
            
            <p class="controls-hint">💡 Стрелки/WASD — движение</p>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/grid.js"></script>
    <script src="js/hamster.js"></script>
    <script src="js/ghosts.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
