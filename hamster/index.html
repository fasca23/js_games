<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
  <title>🐹 Хомяк - Захват территории</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      padding: 10px;
    }
    
    .game-wrapper {
      background: #1a1a2e;
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 0 40px rgba(0, 255, 0, 0.3), 0 0 80px rgba(0, 0, 0, 0.8);
      border: 2px solid #00ff41;
    }
    
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding: 10px 15px;
      background: #000;
      border-radius: 10px;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-size: 18px;
      font-weight: bold;
    }
    
    .score {
      font-size: 22px;
      text-shadow: 0 0 10px #00ff41;
    }
    
    .lives {
      display: flex;
      gap: 5px;
    }
    
    .heart {
      font-size: 24px;
    }
    
    canvas {
      display: block;
      border: 3px solid #00ff41;
      border-radius: 5px;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.5), inset 0 0 20px rgba(0, 255, 0, 0.1);
      background: #000;
    }
    
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 15px;
      gap: 10px;
    }
    
    .control-row {
      display: flex;
      gap: 10px;
    }
    
    .control-btn {
      width: 60px;
      height: 60px;
      background: #000;
      border: 2px solid #00ff41;
      color: #00ff41;
      font-size: 28px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
    }
    
    .control-btn:active {
      background: #00ff41;
      color: #000;
      box-shadow: 0 0 30px rgba(0, 255, 0, 0.8);
      transform: scale(0.9);
    }
    
    .restart-btn {
      padding: 15px 30px;
      background: #000;
      border: 2px solid #ff0040;
      color: #ff0040;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      text-shadow: 0 0 10px #ff0040;
      box-shadow: 0 0 15px rgba(255, 0, 64, 0.3);
      transition: all 0.2s;
    }
    
    .restart-btn:active {
      background: #ff0040;
      color: #000;
      box-shadow: 0 0 30px rgba(255, 0, 64, 0.8);
    }
    
    .message {
      color: #ff0040;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      margin-top: 5px;
      text-shadow: 0 0 10px #ff0040;
      min-height: 24px;
    }
    
    @media (max-width: 500px) {
      .control-btn {
        width: 50px;
        height: 50px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="game-header">
    <div>🐹 <span class="score" id="scoreDisplay">0%</span></div>
    <div class="lives">
      <span class="heart" id="heart1">❤️</span>
      <span class="heart" id="heart2">❤️</span>
      <span class="heart" id="heart3">❤️</span>
    </div>
    <div>👻 <span id="ghostCount">2</span></div>
  </div>
  
  <canvas id="gameCanvas"></canvas>
  
  <div class="controls">
    <div class="control-row">
      <button class="control-btn" id="btnUp">▲</button>
    </div>
    <div class="control-row">
      <button class="control-btn" id="btnLeft">◀</button>
      <button class="control-btn" id="btnDown">▼</button>
      <button class="control-btn" id="btnRight">▶</button>
    </div>
    <button class="restart-btn" id="restartBtn">🔄 НОВАЯ ИГРА</button>
    <div class="message" id="message"></div>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const COLS = 25;
    const ROWS = 25;
    let cellSize;
    
    function resizeCanvas() {
      const maxWidth = Math.min(window.innerWidth - 30, 500);
      const maxHeight = Math.min(window.innerHeight - 350, 500);
      const size = Math.min(maxWidth, maxHeight);
      canvas.width = size;
      canvas.height = size;
      cellSize = size / COLS;
    }
    
    resizeCanvas();
    window.addEventListener('resize', () => {
      resizeCanvas();
      draw();
    });
    
    // Состояние игры
    let hamster = { x: 12, y: 12 };
    let direction = { x: 0, y: 0 };
    let nextDirection = { x: 0, y: 0 };
    
    // Сетка поля: 0 - свободно, 1 - захвачено, 2 - граница
    let grid = [];
    
    // Путь хомяка с момента выхода с территории
    let currentPath = [];
    let isOutside = false;
    
    let ghosts = [];
    let score = 0;
    let totalCells = COLS * ROWS;
    let capturedCells = 0;
    let lives = 3;
    let gameRunning = true;
    let gameLoop = null;
    let speed = 120;
    
    // Инициализация сетки
    function initGrid() {
      grid = [];
      for (let y = 0; y < ROWS; y++) {
        grid[y] = [];
        for (let x = 0; x < COLS; x++) {
          // Границы поля сразу захвачены
          if (x === 0 || x === COLS - 1 || y === 0 || y === ROWS - 1) {
            grid[y][x] = 2; // граница
          } else {
            grid[y][x] = 0; // свободно
          }
        }
      }
      // Начальная позиция хомяка захвачена
      grid[hamster.y][hamster.x] = 1;
      capturedCells = (COLS * 2 + ROWS * 2 - 4) + 1; // границы + стартовая клетка
    }
    
    function isCaptured(x, y) {
      if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return true;
      return grid[y][x] === 1 || grid[y][x] === 2;
    }
    
    function isFree(x, y) {
      if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return false;
      return grid[y][x] === 0;
    }
    
    function createGhosts() {
      ghosts = [];
      const numGhosts = 2;
      
      for (let i = 0; i < numGhosts; i++) {
        let gx, gy;
        do {
          gx = Math.floor(Math.random() * (COLS - 4)) + 2;
          gy = Math.floor(Math.random() * (ROWS - 4)) + 2;
        } while (isCaptured(gx, gy) || (gx === hamster.x && gy === hamster.y));
        
        ghosts.push({
          x: gx,
          y: gy,
          dx: Math.random() > 0.5 ? 1 : -1,
          dy: 0,
          type: Math.random() > 0.5 ? 'chaser' : 'random'
        });
        
        if (Math.random() > 0.5) {
          ghosts[i].dx = 0;
          ghosts[i].dy = Math.random() > 0.5 ? 1 : -1;
        }
      }
      
      document.getElementById('ghostCount').textContent = ghosts.length;
    }
    
    function moveGhosts() {
      for (let ghost of ghosts) {
        if (ghost.type === 'chaser' && Math.random() < 0.8) {
          const dx = hamster.x - ghost.x;
          const dy = hamster.y - ghost.y;
          
          if (Math.abs(dx) > Math.abs(dy)) {
            ghost.dx = dx > 0 ? 1 : -1;
            ghost.dy = 0;
          } else {
            ghost.dy = dy > 0 ? 1 : -1;
            ghost.dx = 0;
          }
        } else if (Math.random() < 0.2) {
          const dirs = [
            { dx: 1, dy: 0 }, { dx: -1, dy: 0 },
            { dx: 0, dy: 1 }, { dx: 0, dy: -1 }
          ];
          const dir = dirs[Math.floor(Math.random() * dirs.length)];
          ghost.dx = dir.dx;
          ghost.dy = dir.dy;
        }
        
        let newX = ghost.x + ghost.dx;
        let newY = ghost.y + ghost.dy;
        
        // Призраки не могут ходить по захваченной территории
        if (isCaptured(newX, newY)) {
          // Меняем направление
          const tempDx = ghost.dx;
          const tempDy = ghost.dy;
          
          // Пробуем противоположное направление
          ghost.dx = -tempDx;
          ghost.dy = -tempDy;
          newX = ghost.x + ghost.dx;
          newY = ghost.y + ghost.dy;
          
          if (isCaptured(newX, newY)) {
            // Пробуем случайное направление
            const dirs = [
              { dx: 1, dy: 0 }, { dx: -1, dy: 0 },
              { dx: 0, dy: 1 }, { dx: 0, dy: -1 }
            ];
            let found = false;
            for (let dir of dirs) {
              const tx = ghost.x + dir.dx;
              const ty = ghost.y + dir.dy;
              if (!isCaptured(tx, ty)) {
                ghost.dx = dir.dx;
                ghost.dy = dir.dy;
                newX = tx;
                newY = ty;
                found = true;
                break;
              }
            }
            if (!found) {
              ghost.dx = 0;
              ghost.dy = 0;
              newX = ghost.x;
              newY = ghost.y;
            }
          }
        }
        
        ghost.x = newX;
        ghost.y = newY;
      }
    }
    
    // Захват территории при возвращении
    function captureTerritory(x, y) {
      if (isCaptured(x, y) && isOutside) {
        // Хомяк вернулся на территорию!
        // Захватываем все клетки, которые он обошёл
        
        let captured = 0;
        for (let cell of currentPath) {
          if (grid[cell.y][cell.x] === 0) {
            grid[cell.y][cell.x] = 1;
            captured++;
          }
        }
        
        if (captured > 0) {
          capturedCells += captured;
          updateScore();
          
          // Эффект захвата
          document.getElementById('message').textContent = `🎉 +${captured} клеток захвачено!`;
          setTimeout(() => {
            if (document.getElementById('message').textContent === `🎉 +${captured} клеток захвачено!`) {
              document.getElementById('message').textContent = '';
            }
          }, 1500);
        }
        
        // Очищаем путь
        currentPath = [];
        isOutside = false;
        
        // Добавляем призраков при необходимости
        const percent = Math.floor((capturedCells / (COLS * ROWS)) * 100);
        if (percent >= 30 && ghosts.length < 3) addGhost();
        if (percent >= 50 && ghosts.length < 4) addGhost();
        if (percent >= 75 && ghosts.length < 5) addGhost();
        
        // Проверка победы
        if (percent >= 80) {
          winGame();
        }
        
        return true;
      }
      return false;
    }
    
    function updateScore() {
      const percent = Math.floor((capturedCells / (COLS * ROWS)) * 100);
      score = percent;
      document.getElementById('scoreDisplay').textContent = percent + '%';
    }
    
    function addGhost() {
      let gx, gy;
      do {
        gx = Math.floor(Math.random() * (COLS - 4)) + 2;
        gy = Math.floor(Math.random() * (ROWS - 4)) + 2;
      } while (isCaptured(gx, gy) || (gx === hamster.x && gy === hamster.y));
      
      ghosts.push({
        x: gx,
        y: gy,
        dx: 1,
        dy: 0,
        type: 'chaser'
      });
      
      document.getElementById('ghostCount').textContent = ghosts.length;
    }
    
    function checkCollision() {
      for (let ghost of ghosts) {
        if (ghost.x === hamster.x && ghost.y === hamster.y) {
          loseLife();
          return;
        }
      }
    }
    
    function loseLife() {
      lives--;
      updateHearts();
      
      if (lives <= 0) {
        gameOver();
      } else {
        resetHamsterPosition();
        document.getElementById('message').textContent = '💔 -1 жизнь! Будь осторожнее!';
        setTimeout(() => {
          if (document.getElementById('message').textContent === '💔 -1 жизнь! Будь осторожнее!') {
            document.getElementById('message').textContent = '';
          }
        }, 1500);
      }
    }
    
    function resetHamsterPosition() {
      // Ищем безопасное место на захваченной территории
      const safeSpots = [];
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (isCaptured(x, y)) {
            let ghostNearby = false;
            for (let ghost of ghosts) {
              if (Math.abs(ghost.x - x) <= 2 && Math.abs(ghost.y - y) <= 2) {
                ghostNearby = true;
                break;
              }
            }
            if (!ghostNearby) {
              safeSpots.push({ x, y });
            }
          }
        }
      }
      
      if (safeSpots.length > 0) {
        const spot = safeSpots[Math.floor(Math.random() * safeSpots.length)];
        hamster.x = spot.x;
        hamster.y = spot.y;
      }
      
      direction = { x: 0, y: 0 };
      nextDirection = { x: 0, y: 0 };
      currentPath = [];
      isOutside = false;
    }
    
    function updateHearts() {
      for (let i = 1; i <= 3; i++) {
        const heart = document.getElementById('heart' + i);
        heart.textContent = i <= lives ? '❤️' : '🖤';
      }
    }
    
    function gameOver() {
      gameRunning = false;
      clearInterval(gameLoop);
      document.getElementById('message').textContent = '💀 ИГРА ОКОНЧЕНА! Призраки поймали хомяка!';
      draw();
    }
    
    function winGame() {
      gameRunning = false;
      clearInterval(gameLoop);
      document.getElementById('message').textContent = '🏆 ПОБЕДА! Хомяк захватил территорию!';
      draw();
    }
    
    function gameStep() {
      if (!gameRunning) return;
      
      if (nextDirection.x !== 0 || nextDirection.y !== 0) {
        direction = { ...nextDirection };
      }
      
      if (direction.x === 0 && direction.y === 0) return;
      
      const newX = hamster.x + direction.x;
      const newY = hamster.y + direction.y;
      
      // Проверка выхода за границы
      if (newX < 0 || newX >= COLS || newY < 0 || newY >= ROWS) return;
      
      // Проверка, не пытается ли хомяк идти сквозь свою территорию
      // (в классической игре хомяк не может ходить по захваченной территории, когда он снаружи)
      if (isOutside && isCaptured(newX, newY)) {
        // Хомяк возвращается на территорию — захватываем!
        hamster.x = newX;
        hamster.y = newY;
        captureTerritory(newX, newY);
        checkCollision();
        moveGhosts();
        checkCollision();
        draw();
        return;
      }
      
      // Если хомяк на территории и пытается выйти
      if (!isOutside && isCaptured(hamster.x, hamster.y) && !isCaptured(newX, newY)) {
        // Выходим с территории
        isOutside = true;
        currentPath = [{ x: newX, y: newY }];
        hamster.x = newX;
        hamster.y = newY;
        checkCollision();
        if (gameRunning) {
          moveGhosts();
          checkCollision();
        }
        draw();
        return;
      }
      
      // Если хомяк уже снаружи и идёт по свободной территории
      if (isOutside && !isCaptured(newX, newY)) {
        // Проверяем, не проходил ли он уже по этой клетке
        let alreadyInPath = false;
        for (let cell of currentPath) {
          if (cell.x === newX && cell.y === newY) {
            alreadyInPath = true;
            break;
          }
        }
        
        if (!alreadyInPath) {
          currentPath.push({ x: newX, y: newY });
        }
        
        hamster.x = newX;
        hamster.y = newY;
        checkCollision();
        if (gameRunning) {
          moveGhosts();
          checkCollision();
        }
        draw();
        return;
      }
      
      // Если хомяк на территории и идёт по территории
      if (!isOutside && isCaptured(hamster.x, hamster.y) && isCaptured(newX, newY)) {
        hamster.x = newX;
        hamster.y = newY;
        checkCollision();
        if (gameRunning) {
          moveGhosts();
          checkCollision();
        }
        draw();
        return;
      }
    }
    
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Рисуем клетки поля
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (grid[y][x] === 1) {
            // Захваченная территория
            ctx.fillStyle = '#1a3a1a';
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
          } else if (grid[y][x] === 2) {
            // Граница
            ctx.fillStyle = '#2a4a2a';
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
          }
        }
      }
      
      // Рисуем путь хомяка (когда он снаружи)
      if (isOutside && currentPath.length > 0) {
        ctx.fillStyle = '#3a6a3a';
        for (let cell of currentPath) {
          ctx.fillRect(cell.x * cellSize, cell.y * cellSize, cellSize, cellSize);
        }
      }
      
      // Сетка
      ctx.strokeStyle = '#0a2a0a';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * cellSize, 0);
        ctx.lineTo(x * cellSize, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * cellSize);
        ctx.lineTo(canvas.width, y * cellSize);
        ctx.stroke();
      }
      
      // Призраки
      for (let ghost of ghosts) {
        const gx = ghost.x * cellSize + cellSize / 2;
        const gy = ghost.y * cellSize + cellSize / 2;
        
        ctx.shadowColor = '#ff0040';
        ctx.shadowBlur = 15;
        
        ctx.fillStyle = ghost.type === 'chaser' ? '#ff0040' : '#ff6600';
        ctx.beginPath();
        ctx.arc(gx, gy - cellSize * 0.1, cellSize * 0.35, Math.PI, 0);
        ctx.lineTo(gx + cellSize * 0.35, gy + cellSize * 0.3);
        
        const waves = 3;
        const waveWidth = (cellSize * 0.7) / waves;
        for (let i = 0; i < waves; i++) {
          const wx = gx - cellSize * 0.35 + i * waveWidth;
          ctx.lineTo(wx + waveWidth / 2, gy + cellSize * 0.1);
          ctx.lineTo(wx + waveWidth, gy + cellSize * 0.3);
        }
        
        ctx.closePath();
        ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(gx - cellSize * 0.12, gy - cellSize * 0.15, cellSize * 0.08, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(gx + cellSize * 0.12, gy - cellSize * 0.15, cellSize * 0.08, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(gx - cellSize * 0.1, gy - cellSize * 0.15, cellSize * 0.04, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(gx + cellSize * 0.14, gy - cellSize * 0.15, cellSize * 0.04, 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.shadowBlur = 0;
      
      // Хомяк
      const hx = hamster.x * cellSize + cellSize / 2;
      const hy = hamster.y * cellSize + cellSize / 2;
      
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 12;
      
      // Тело
      ctx.fillStyle = '#daa520';
      ctx.beginPath();
      ctx.arc(hx, hy, cellSize * 0.35, 0, Math.PI * 2);
      ctx.fill();
      
      // Уши
      ctx.fillStyle = '#b8860b';
      ctx.beginPath();
      ctx.arc(hx - cellSize * 0.2, hy - cellSize * 0.3, cellSize * 0.13, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(hx + cellSize * 0.2, hy - cellSize * 0.3, cellSize * 0.13, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#ffcc80';
      ctx.beginPath();
      ctx.arc(hx - cellSize * 0.2, hy - cellSize * 0.3, cellSize * 0.07, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(hx + cellSize * 0.2, hy - cellSize * 0.3, cellSize * 0.07, 0, Math.PI * 2);
      ctx.fill();
      
      // Мордочка
      ctx.fillStyle = '#ffcc80';
      ctx.beginPath();
      ctx.ellipse(hx, hy + cellSize * 0.05, cellSize * 0.18, cellSize * 0.13, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Нос
      ctx.fillStyle = '#ff69b4';
      ctx.beginPath();
      ctx.arc(hx, hy + cellSize * 0.03, cellSize * 0.05, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      
      // Глаза
      ctx.fillStyle = 'black';
      ctx.beginPath();
      ctx.arc(hx - cellSize * 0.1, hy - cellSize * 0.05, cellSize * 0.06, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(hx + cellSize * 0.1, hy - cellSize * 0.05, cellSize * 0.06, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(hx - cellSize * 0.08, hy - cellSize * 0.07, cellSize * 0.025, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(hx + cellSize * 0.12, hy - cellSize * 0.07, cellSize * 0.025, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function setDirection(dx, dy) {
      if (!gameRunning) return;
      if (dx === -direction.x && dy === -direction.y && (dx !== 0 || dy !== 0)) return;
      nextDirection = { x: dx, y: dy };
    }
    
    document.getElementById('btnUp').addEventListener('click', () => setDirection(0, -1));
    document.getElementById('btnDown').addEventListener('click', () => setDirection(0, 1));
    document.getElementById('btnLeft').addEventListener('click', () => setDirection(-1, 0));
    document.getElementById('btnRight').addEventListener('click', () => setDirection(1, 0));
    
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowUp': case 'w': case 'W': e.preventDefault(); setDirection(0, -1); break;
        case 'ArrowDown': case 's': case 'S': e.preventDefault(); setDirection(0, 1); break;
        case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); setDirection(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDirection(1, 0); break;
      }
    });
    
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });
    canvas.addEventListener('touchmove', (e) => e.preventDefault());
    canvas.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 20) setDirection(1, 0);
        else if (dx < -20) setDirection(-1, 0);
      } else {
        if (dy > 20) setDirection(0, 1);
        else if (dy < -20) setDirection(0, -1);
      }
    });
    
    document.getElementById('restartBtn').addEventListener('click', startGame);
    
    function startGame() {
      clearInterval(gameLoop);
      
      hamster = { x: 12, y: 12 };
      direction = { x: 0, y: 0 };
      nextDirection = { x: 0, y: 0 };
      currentPath = [];
      isOutside = false;
      lives = 3;
      score = 0;
      gameRunning = true;
      
      initGrid();
      createGhosts();
      updateHearts();
      updateScore();
      document.getElementById('message').textContent = '';
      
      draw();
      gameLoop = setInterval(gameStep, speed);
    }
    
    startGame();
  })();
</script>
</body>
