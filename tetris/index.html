<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎮 Тетрис</title>
    <link rel="stylesheet" href="tetris.css">
</head>
<body>
    <div class="game-wrapper">
        <h1>🎮 Тетрис</h1>
        
        <div class="game-container">
            <div class="top-info">
                <div class="score-box">
                    <span class="score-label">ОЧКИ</span>
                    <span class="value" id="scoreValue">0</span>
                </div>
                <div class="next-box">
                    <span class="next-label">СЛЕД.</span>
                    <canvas id="nextCanvas" width="80" height="80"></canvas>
                </div>
                <button class="restart-btn" onclick="restartGame()">🔄 Заново</button>
            </div>
            
            <canvas id="boardCanvas" width="300" height="600"></canvas>
            
            <div class="status-text" id="gameStatusText">⚡ Скорость: 500мс 🐢</div>
            
            <div class="mobile-controls">
                <div class="control-row">
                    <button class="ctrl-btn" id="btnLeft">◀</button>
                    <button class="ctrl-btn" id="btnRotate">↻</button>
                    <button class="ctrl-btn" id="btnRight">▶</button>
                </div>
                <div class="control-row">
                    <button class="ctrl-btn" id="btnDown">▼</button>
                    <button class="ctrl-btn hard-drop-btn" id="btnHardDrop">⬇ ХАРД ДРОП</button>
                </div>
            </div>
            
            <p class="controls-hint">💡 Стрелки / WASD / Пробел — пауза</p>
        </div>
    </div>
    
    <script src="tetris.js"></script>
</body>
</html>
