{% extends "base.html" %}

{% block title %}💣 Сапёр — Классическая игра{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="/static/projects/minesweeper/minesweeper.css">
{% endblock %}

{% block content %}
<div class="game-wrapper">
    <h1>💣 Сапёр</h1>
    
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="stats-row">
            <div class="stat">🚩 Флаги: <span id="flagsValue">0</span></div>
            <div class="stat">⏱️ Время: <span id="timeValue">0с</span></div>
        </div>
        
        <div class="game-buttons">
            <button class="restart-btn" onclick="restartGame()">🔄 Заново</button>
            <button class="mode-btn" id="modeBtn" onclick="toggleMode()">🚩 Режим: Копать</button>
        </div>
        
        <p class="controls-hint">💡 ЛКМ — копать | ПКМ/Долгое нажатие — флаг</p>
    </div>
    
    <a href="/projects" class="back-link">← Назад к проектам</a>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/projects/minesweeper/minesweeper.js"></script>
{% endblock %}
