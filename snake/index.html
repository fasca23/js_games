<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 Змейка</title>
    <link rel="stylesheet" href="snake.css">
</head>
<body>
    <div class="game-wrapper">
        <h1>🐍 Змейка</h1>
        
        <div class="game-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div class="score">🍎 Счёт: <span id="scoreValue">0</span></div>
            <div class="speed">⚡ Скорость: <span id="speedValue">200мс</span></div>
            
            <div class="game-buttons">
                <button class="restart-btn" onclick="restartGame()">🔄 Заново</button>
                <button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸️ Пауза</button>
            </div>
            
            <div class="mobile-controls">
                <div class="control-row">
                    <button class="control-btn placeholder" disabled></button>
                    <button class="control-btn" id="btnUp">▲</button>
                    <button class="control-btn placeholder" disabled></button>
                </div>
                <div class="control-row">
                    <button class="control-btn" id="btnLeft">◀</button>
                    <button class="control-btn" id="btnDown">▼</button>
                    <button class="control-btn" id="btnRight">▶</button>
                </div>
            </div>
            
            <p class="controls-hint">💡 Стрелки / WASD / Свайпы / Пробел — пауза</p>
        </div>
    </div>
    
    <script src="snake.js"></script>
</body>
</html>
