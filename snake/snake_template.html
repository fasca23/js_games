{% extends "base.html" %}

{% block title %}Змейка — Классическая игра{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="/static/projects/snake/snake.css">
{% endblock %}

{% block content %}
<div class="snake-wrapper">
    <h1>🐍 Змейка</h1>
    
    <div class="snake-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="score">Счёт: <span id="scoreValue">0</span></div>
        <div class="speed">Скорость: <span id="speedValue">🐢</span></div>
        <div class="game-buttons">
            <button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸️ Пауза</button>
            <button class="restart-btn" onclick="restartGame()">🔄 Новая игра</button>
        </div>
        
        <div class="mobile-controls">
            <div class="control-row">
                <button class="control-btn" id="btnUp">▲</button>
            </div>
            <div class="control-row">
                <button class="control-btn" id="btnLeft">◀</button>
                <button class="control-btn" id="btnDown">▼</button>
                <button class="control-btn" id="btnRight">▶</button>
            </div>
        </div>
    </div>
    <a href="/projects" class="back-link">← Назад к проектам</a>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/projects/snake/snake.js"></script>
{% endblock %}
