<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👻 Pac-Man</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-wrapper">
        <h1>👻 Pac-Man</h1>
        
        <div class="game-container">
            <canvas id="gameCanvas"></canvas>
            
            <div class="stats-row">
                <div class="stat">🏆 Счёт: <span id="scoreValue">0</span></div>
                <div class="stat">❤️ Жизни: <span id="livesValue">3</span></div>
                <div class="stat">🎯 Уровень: <span id="levelValue">1</span></div>
            </div>
            
            <div class="game-buttons">
                <button class="restart-btn" onclick="restartGame()">🔄 Заново</button>
                <button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸️ Пауза</button>
            </div>
            
            <div class="mobile-controls">
                <button class="ctrl-btn up-btn" onmousedown="setDirection(0,-1)">▲</button>
                <div class="mid-row">
                    <button class="ctrl-btn left-btn" onmousedown="setDirection(-1,0)">◀</button>
                    <button class="ctrl-btn right-btn" onmousedown="setDirection(1,0)">▶</button>
                </div>
                <button class="ctrl-btn down-btn" onmousedown="setDirection(0,1)">▼</button>
            </div>
            
            <p class="controls-hint">💡 Стрелки/WASD — движение | Пробел — пауза</p>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/map.js"></script>
    <script src="js/pacman.js"></script>
    <script src="js/ghosts.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
